# plugin.yaml

schema_version: 1

name: dex-smart-alerts
version: "2.0.0"

description: >
  Fully autonomous persistent OKX DEX monitoring and smart alert system
  using recurring cron workflows, real-time market tracking,
  breakout detection, volatility monitoring, and Telegram notifications.

author:
  name: "Nolan Rothschild"
  github: "nolan7512"

license: MIT

category: utility

tags:

- alerts
- okx
- cron
- monitoring
- notifications
- utility
- market-watch
- smart-alerts
- volatility
- breakout-monitoring

components:
  skill:
    dir: "."

dependencies:

- okx-dex-market
- okx-dex-token

capabilities:

- recurring-monitoring
- cron-execution
- telegram-notifications
- volatility-detection
- breakout-alerts
- support-resistance-monitoring
- autonomous-market-tracking

api_calls:

- https://api.telegram.org
- https://web3.okx.com

permissions:
cron: true
notifications: true
external_api: true

runtime:
persistent: true
autonomous: true
